<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scroll to Three Product Cards</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <section class="journey">
      <div class="journey__sticky">
        <h2 class="journey__heading">Where are you in your journey?</h2>

        <div class="journey__card-row">
          <article class="card card--left">
            <div class="card__front">
              <img
                src="https://framerusercontent.com/images/Wne6ywIpp0BwY8GoBBoZlZEoC9g.png"
                alt="Panoramic scene crop for left card"
              />
            </div>
            <div class="card__back">
              <h3>Card One</h3>
              <p>Placeholder description for card one.</p>
            </div>
          </article>

          <article class="card card--centre">
            <div class="card__front">
              <img
                src="https://framerusercontent.com/images/Wne6ywIpp0BwY8GoBBoZlZEoC9g.png"
                alt="Panoramic scene crop for center card"
              />
            </div>
            <div class="card__back">
              <h3>Card Two</h3>
              <p>Placeholder description for card two.</p>
            </div>
          </article>

          <article class="card card--right">
            <div class="card__front">
              <img
                src="https://framerusercontent.com/images/Wne6ywIpp0BwY8GoBBoZlZEoC9g.png"
                alt="Panoramic scene crop for right card"
              />
            </div>
            <div class="card__back">
              <h3>Card Three</h3>
              <p>Placeholder description for card three.</p>
            </div>
          </article>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
    <script src="./index.js"></script>
  </body>
 </html>
