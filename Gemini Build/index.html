<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll-Driven Card Flip Effect</title>
  <link rel="stylesheet" href="index.css">
  <style>
    .build-header { font-family: system-ui, -apple-system, sans-serif; padding: 0.75rem 1rem; background: #1a1a1a; display: flex; flex-wrap: wrap; align-items: center; gap: 1rem; border-bottom: 1px solid #333; }
    .build-header h1 { margin: 0; font-size: 1.25rem; font-weight: 600; color: #fff; }
    .build-header nav { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .build-header a { display: block; padding: 0.5rem 1rem; background: #2d2d2d; color: #e0e0e0; text-decoration: none; border-radius: 8px; border: 1px solid #444; font-size: 0.875rem; transition: background 0.2s, border-color 0.2s; }
    .build-header a:hover { background: #3d3d3d; border-color: #666; }
    .build-header a.is-current { opacity: 0.7; pointer-events: none; }
  </style>
</head>
<body>
  <header class="build-header">
    <h1>Gemini Build</h1>
    <nav>
      <a href="../Opus%20Build/index.html">Opus Build</a>
      <a href="../Codex%20Build/index.html">Codex Build</a>
      <a href="index.html" class="is-current">Gemini Build</a>
    </nav>
  </header>

<section class="journey">
  <div class="journey__sticky">

    <h2 class="journey__heading">Where are you in your journey?</h2>

    <div class="journey__card-row">

      <article class="card card--left">
        <div class="card__front">
          <img src="https://framerusercontent.com/images/Wne6ywIpp0BwY8GoBBoZlZEoC9g.png" alt="">
        </div>
        <div class="card__back">
          <h3>Card One</h3>
          <p>Placeholder description for card one.</p>
        </div>
      </article>

      <article class="card card--centre">
        <div class="card__front">
          <img src="https://framerusercontent.com/images/Wne6ywIpp0BwY8GoBBoZlZEoC9g.png" alt="">
        </div>
        <div class="card__back">
          <h3>Card Two</h3>
          <p>Placeholder description for card two.</p>
        </div>
      </article>

      <article class="card card--right">
        <div class="card__front">
          <img src="https://framerusercontent.com/images/Wne6ywIpp0BwY8GoBBoZlZEoC9g.png" alt="">
        </div>
        <div class="card__back">
          <h3>Card Three</h3>
          <p>Placeholder description for card three.</p>
        </div>
      </article>

    </div>
  </div>
</section>

<!-- GSAP and ScrollTrigger -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<!-- Main script -->
<script src="index.js"></script>

</body>
</html>
